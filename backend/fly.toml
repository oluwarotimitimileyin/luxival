# syntax reference: https://fly.io/docs/reference/configuration/
app = "luxival-audit-api"
primary_region = "arn"   # Stockholm — closest to Helsinki

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ALLOWED_ORIGINS = "https://luxival.com"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
